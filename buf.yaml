version: v2

modules:
  - path: proto
    name: buf.build/redpandadata/dataplane

deps:
  - buf.build/bufbuild/protovalidate
  - buf.build/googleapis/googleapis
  - buf.build/grpc-ecosystem/grpc-gateway:v2.24.0
  - buf.build/redpandadata/common:6e06f84ad8234f5d9040a34f8c602fd4
  - buf.build/redpandadata/core:ee867ae38d234429be446a794c27b345
  - buf.build/redpandadata/otel
lint:
  use:
    - STANDARD
  except:
    - FIELD_NOT_REQUIRED
    - PACKAGE_NO_IMPORT_CYCLE
  rpc_allow_google_protobuf_empty_responses: true
breaking:
  use:
    - FILE
    - WIRE
    - WIRE_JSON
  except:
    - EXTENSION_NO_DELETE
    - FIELD_SAME_DEFAULT
  ignore:
    - proto/redpanda/api/console/v1alpha1
    - proto/redpanda/api/dataplane/v1alpha1
    - proto/redpanda/api/dataplane/v1alpha3
    - proto/redpanda/api/dataplane/v1/mcp.proto

