---
name: "Frontend React Doctor"
on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-react-doctor.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-react-doctor.yml"
env:
  CI: true
jobs:
  react-doctor:
    name: React Doctor
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Run React Doctor
        id: react_doctor
        working-directory: frontend
        continue-on-error: true
        run: bun run doctor
      - name: Publish React Doctor score
        if: always()
        shell: bash
        run: |
          OUTCOME="${{ steps.react_doctor.outcome }}"
          {
            echo "# React Doctor"
            echo ""
            echo "- Status: $OUTCOME"
          } >> "$GITHUB_STEP_SUMMARY"
