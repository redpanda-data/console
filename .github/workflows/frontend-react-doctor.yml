---
name: "Frontend React Doctor"
on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-react-doctor.yml"
env:
  BUN_CACHE_SALT: 2026-05-13
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  react-doctor:
    timeout-minutes: 5
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ env.BUN_CACHE_SALT }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-${{ env.BUN_CACHE_SALT }}-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run React Doctor
        run: bun run doctor
