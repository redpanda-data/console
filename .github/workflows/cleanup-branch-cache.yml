---
name: cleanup-branch-cache
on:
  delete:
    branches:
      - '**'
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cleanup caches for deleted branch
        uses: actions/github-script@v7
        with:
          script: |
            const ref = `refs/heads/${context.payload.ref}`;
            console.log(`Cleaning up caches for branch: ${ref}`);

            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
            });

            for (const cache of caches.data.actions_caches) {
              console.log(`Deleting cache: ${cache.key} (${cache.size_in_bytes} bytes)`);
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id,
              });
            }

            console.log(`Deleted ${caches.data.actions_caches.length} cache(s)`);
