---
name: Proto generate check

on:
  pull_request:
    paths:
      - '**/*.proto'
      - '**/buf.yaml'
      - '**/buf.gen*.yaml'
      - '**/buf.lock'
      - 'taskfiles/proto.yaml'
      - '.github/workflows/proto-generate.yml'

permissions:
  contents: read
  id-token: write  # OIDC to assume AWS role for Secrets Manager

jobs:
  proto-generate:
    name: Proto generate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.RP_AWS_CRED_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.RP_AWS_CRED_ACCOUNT_ID }}:role/${{ vars.RP_AWS_CRED_BASE_ROLE_NAME }}${{ github.event.repository.name }}

      - uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,sdlc/prod/github/buf_token
          parse-json-secrets: true

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache proto tools
        uses: actions/cache@v5
        with:
          path: build
          key: proto-tools-${{ runner.os }}-go${{ hashFiles('backend/go.mod') }}-${{ hashFiles('taskfiles/proto.yaml') }}

      - name: Generate protos
        run: task proto:generate