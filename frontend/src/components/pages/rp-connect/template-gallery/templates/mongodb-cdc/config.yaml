input:
  mongodb_cdc:
    # ── Connection (filled in from the form) ────────────────────────────────
    url: ${slot.url}
    database: ${slot.database}
    collections:                           # accepts several — add more entries here
      - ${slot.collection}

    # ── Change-stream behavior ──────────────────────────────────────────────
    stream_snapshot: false                 # enable to seed existing documents first
    checkpoint_cache: mongodb_cdc_checkpoint # cache resource storing the resume token (defined below)
    # document_mode: update_lookup         # partial_update | pre_and_post_images | update_lookup
    # checkpoint_limit: 1000
    # read_batch_size: 1000
    # snapshot_auto_bucket_sharding: true  # for MongoDB Atlas snapshots

    # ── Error handling ──────────────────────────────────────────────────────
    # auto_replay_nacks: true              # default — re-deliver NACKed messages

output:
  redpanda:
    seed_brokers:
      - ${REDPANDA_BROKERS}
    topic: ${slot.targetTopic}

    # Engine defaults (max_in_flight 256, idempotent writes) are already tuned.
    compression: snappy

cache_resources:
  # Persists the change-stream resume token so restarts resume instead of re-snapshotting.
  - label: mongodb_cdc_checkpoint
    memory: {}                             # swap for a persistent cache to resume across restarts
