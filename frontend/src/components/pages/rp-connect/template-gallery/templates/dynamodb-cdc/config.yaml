input:
  aws_dynamodb_cdc:
    # ── Connection (filled in from the form) ────────────────────────────────
    tables:
      - ${slot.tableName}
    region: ${slot.region}
    credentials:
      id: ${slot.awsAccessKey}
      secret: ${slot.awsSecretKey}

    # ── Where to start + snapshots ──────────────────────────────────────────
    start_from: trim_horizon               # or 'latest' for new records only
    snapshot_mode: none                    # 'snapshot_and_cdc' scans the table before streaming
    # checkpoint_table: redpanda_dynamodb_checkpoints   # created if it doesn't exist

    # ── Stream tuning ───────────────────────────────────────────────────────
    # batch_size: 1000                     # records per shard read (1-1000)
    # checkpoint_limit: 1000               # unacked messages before a checkpoint update

output:
  redpanda:
    seed_brokers:
      - ${REDPANDA_BROKERS}
    topic: ${slot.targetTopic}

    # ── Throughput defaults — tune for your workload ────────────────────────
    max_in_flight: 64
    compression: snappy
    idempotent_write: true
