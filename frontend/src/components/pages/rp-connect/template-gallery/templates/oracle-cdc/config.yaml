input:
  oracledb_cdc:
    # ── Connection (filled in from the form) ────────────────────────────────
    connection_string: ${slot.dsn}
    include:
      - ${slot.includedTable}
    # exclude:
    #   - SCHEMA.PRIVATETABLE

    # ── Snapshot of existing rows before streaming changes ──────────────────
    stream_snapshot: true                  # capture current rows on first run

    # ── LogMiner + checkpointing ────────────────────────────────────────────
    checkpoint_limit: 1024                 # outstanding messages before backpressure
    # pdb_name: MYPDB                      # set when connecting to a CDB root
    # checkpoint_cache: my_cache           # cache resource persisting the current SCN

    # ── Error handling ──────────────────────────────────────────────────────
    auto_replay_nacks: true                # re-deliver NACKed messages

output:
  redpanda:
    seed_brokers:
      - ${REDPANDA_BROKERS}
    topic: ${slot.targetTopic}

    # ── Throughput defaults — tune for your workload ────────────────────────
    max_in_flight: 64
    compression: snappy
    idempotent_write: true
