input:
  postgres_cdc:
    # ── Connection (filled in from the form) ────────────────────────────────
    dsn: ${slot.dsn}
    schema: ${slot.schema}
    slot_name: ${slot.slotName}
    tables:                                # bare table names — the schema comes from `schema` above
      - ${slot.includedTable}
    # tls:
    #   skip_cert_verify: true             # only for servers with self-signed certificates

    # ── Snapshot of existing rows before streaming changes ──────────────────
    # Enable to seed existing data; every snapshotted table must have a primary key.
    stream_snapshot: false

    # ── Replication tuning (benchmark-tuned batch; other knobs at engine defaults) ──
    batching:
      count: 5000
      period: 1s
    # checkpoint_limit: 1024               # outstanding messages before backpressure
    # snapshot_batch_size: 1000            # only relevant while snapshotting
    # temporary_slot: false                # set true if you don't need durable slots
    # pg_standby_timeout: 10s
    # pg_wal_monitor_interval: 3s

    # ── Transaction markers (most users leave these off) ────────────────────
    # include_transaction_markers: false

    # ── Error handling ──────────────────────────────────────────────────────
    # auto_replay_nacks: true              # default — re-deliver NACKed messages

output:
  redpanda:
    seed_brokers:
      - ${REDPANDA_BROKERS}
    topic: ${slot.targetTopic}

    # Engine defaults (max_in_flight 256, idempotent writes) are already tuned; batching happens
    # on the CDC input.
    compression: snappy
