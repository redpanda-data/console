syntax = "proto3";

package redpanda.api.dataplane.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "redpanda/api/auth/v1/authorization.proto";
import "redpanda/api/dataplane/v1/acl.proto";
import "google/rpc/status.proto";

// Role defines a role in the system.
message Role {
  // The name of the role.
  string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];
}

// ListRolesRequest is the request for ListRoles.
message ListRolesRequest {
  // Filter options.
  message Filter {
    // Filter results only roles named with the prefix.
    string name_prefix = 1 [
      (buf.validate.field).string.max_len = 128,
      (buf.validate.field).string.pattern = "^([^,=]*)$"
    ];

    // Filter results to only roles with names which contain the string.
    string name_contains = 2 [
      (buf.validate.field).string.max_len = 128,
      (buf.validate.field).string.pattern = "^([^,=]*)$"
    ];

    // Return only roles assigned to this principal.
    string principal = 3 [(buf.validate.field).string.max_len = 128];
  }

  // Optional filter.
  optional Filter filter = 1;

  // Page size.
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: -1
    lte: 1000
  }];

  // Value of the next_page_token field returned by the previous response.
  // If not provided, the system assumes the first page is requested.
  string page_token = 3;
}

// ListRolesResponse is the response for ListRoles.
message ListRolesResponse {
  // The roles in the system.
  repeated Role roles = 1;

  // Token to retrieve the next page.
  string next_page_token = 2;
}

// CreateRoleRequest is the request for CreateRole.
message CreateRoleRequest {
  // The role to create.
  Role role = 1;
}

// CreateRoleResponse is the response for CreateRole.
message CreateRoleResponse {
  // The role.
  Role role = 1;
}

// CreateRoleRequest is the request for CreateRole.
message GetRoleRequest {
  // The role name.
  string role_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];
}

// GetRoleResponse is the response to GetRole.
message GetRoleResponse {
  // The Role.
  Role role = 1;

  // Members assigned to the role.
  repeated RoleMembership members = 2;
}

// DeleteRoleRequest is the request for DeleteRole.
message DeleteRoleRequest {
  // The role name.
  string role_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];

  // Whether to delete the ACLs bound to the role.
  bool delete_acls = 2;
}

// DeleteRoleResponse is the response for DeleteRole.
message DeleteRoleResponse {}

// List role members for a role. That is user principals assigned to that role.
message ListRoleMembersRequest {
  // Filter options.
  message Filter {
    // Filter results to only members with names which contain the string.
    string name_contains = 1 [(buf.validate.field).string.max_len = 128];
  }

  // The role name.
  string role_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];

  // Optional filter.
  optional Filter filter = 2;

  // Page size.
  int32 page_size = 3 [(buf.validate.field).int32 = {
    gte: -1
    lte: 1000
  }];

  // Value of the next_page_token field returned by the previous response.
  // If not provided, the system assumes the first page is requested.
  string page_token = 4;
}

// ListRoleMembersResponse is the response for ListRoleMembers.
message ListRoleMembersResponse {
  // The role name.
  string role_name = 1;

  // Members assigned to the role.
  repeated RoleMembership members = 2;

  // Token to retrieve the next page.
  string next_page_token = 3;
}

// RoleMembership is the role membership.
message RoleMembership {
  // The name of the principal assigned to the role.
  string principal = 1;
}

// UpdateRoleMembershipRequest is the request to UpdateRoleMembership.
message UpdateRoleMembershipRequest {
  // The role name.
  string role_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];

  // Create the role if it doesn't already exist.
  // If the role is created in this way, the “add” list will be respected, but the “remove” list will be ignored.
  bool create = 2;

  // Members to assign to the role.
  repeated RoleMembership add = 3;

  // Members to remove from the role.
  repeated RoleMembership remove = 4;
}

// UpdateRoleMembershipResponse is the response for UpdateRoleMembership.
message UpdateRoleMembershipResponse {
  // The role name.
  string role_name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 128,
    (buf.validate.field).string.pattern = "^[^,=]+$"
  ];

  // Members assigned to the role.
  repeated RoleMembership added = 2;

  // Members removed from the role.
  repeated RoleMembership removed = 3;
}


message ListSchemaRegistryACLsRequest {
  message Filter {
    // The type of resource (topic, consumer group, etc.) this
    // ACL targets.
    ACL.ResourceType resource_type = 1 [(buf.validate.field).enum = {defined_only: true}];
    // The name of the resource this ACL targets.
    optional string resource_name = 2;
    // The pattern to use for matching the specified resource_name
    // (any, exact match, literal, or prefixed).
    ACL.ResourcePatternType resource_pattern_type = 3 [(buf.validate.field).enum.defined_only = true];
    // The user for whom this ACL applies. With the Kafka simple
    // authorizer, you must include the prefix "User:" with the user name.
    optional string principal = 4;
    // The host address to use for this ACL. To allow a principal
    // access from multiple hosts, you must create an ACL for each host.
    optional string host = 5;
    // The operation that is allowed or denied (e.g. READ).
    ACL.Operation operation = 6 [(buf.validate.field).enum.defined_only = true];
    // Whether the operation should be allowed or denied.
    ACL.PermissionType permission_type = 7 [(buf.validate.field).enum.defined_only = true];
  }

  Filter filter = 1;
}

message ListSchemaRegistryACLsResponse {
  message Policy {
    // The user for whom this ACL applies.
    string principal = 1;
    // The host address for this ACL.
    string host = 2;
    ACL.Operation operation = 3;
    ACL.PermissionType permission_type = 4;
  }

  message Resource {
    ACL.ResourceType resource_type = 1;
    // The name of the resource this ACL targets.
    string resource_name = 2;
    ACL.ResourcePatternType resource_pattern_type = 3;
    repeated Policy acls = 4;
  }

  repeated Resource resources = 1;
}

message CreateSchemaRegistryACLRequest {
  option (buf.validate.message).cel = {
    id: "resource_name_must_be_set_except_for_cluster_resource_type"
    expression:
        "this.resource_type == 4 && size(this.resource_name) == 0 ? ''"
            ": this.resource_type == 4 && this.resource_name != 'kafka-cluster' ? 'Field resource_name must be set to \"kafka-cluster\" or empty when using resource_type=CLUSTER'"
            ": this.resource_type != 4 && size(this.resource_name) == 0 ? 'Field resource_name must be set'"
            ": ''"
  };

  ACL.ResourceType resource_type = 1 [
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [
        0,
        1
      ] /* Disallow: Unspecified and ANY */
    },
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // The name of the resource this ACL targets.
  // For requests with resource_type CLUSTER, this will default to "kafka-cluster".
  string resource_name = 2;

  ACL.ResourcePatternType resource_pattern_type = 3 [
    (buf.validate.field).enum = {
      defined_only: true
      in: [
        3,
        4
      ]
    },
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // The user for whom this ACL applies. With the Kafka simple
  // authorizer, you must include the prefix "User:" with the user name.
  string principal = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).string.prefix = "User:"
  ];

  // The host address to use for this ACL. To allow a principal
  // access from multiple hosts, you must create an ACL for each host.
  string host = 5 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true,
    (buf.validate.field).cel = {
      id: "wildcard_or_ip_address"
      message: "Field host must be either wildcard (*) or a valid IP address."
      expression: "this == '*' ? true : this.isIp()"
    }
  ];

  ACL.Operation operation = 6 [
    (buf.validate.field).enum = {
      defined_only: true
      not_in: [
        0,
        1
      ] /* Disallow: Unspecified and ANY */
    },
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  ACL.PermissionType permission_type = 7 [
    (buf.validate.field).enum = {
      defined_only: true
      in: [
        2,
        3
      ] /* Allow or Deny */
    },
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

message CreateSchemaRegistryACLResponse {}

message DeleteSchemaRegistryACLsRequest {
  message Filter {
    // The type of resource (topic, consumer group, etc.) this
    // ACL targets.
    ACL.ResourceType resource_type = 1 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).required = true,
      (buf.validate.field).enum = {
        defined_only: true
        not_in: [0] /* Disallow: Unspecified */
      }
    ];

    // The name of the resource this ACL targets.
    optional string resource_name = 2;

    // The pattern to use for matching the specified resource_name
    // (any, exact match, literal, or prefixed).
    ACL.ResourcePatternType resource_pattern_type = 3 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).required = true,
      (buf.validate.field).enum = {
        defined_only: true
        not_in: [0] /* Disallow: Unspecified */
      }
    ];

    // The user for whom this ACL applies. With the Kafka simple
    // authorizer, you must include the prefix "User:" with the user name.
    optional string principal = 4;

    // The host address to use for this ACL. To allow a principal
    // access from multiple hosts, you must create an ACL for each host.
    optional string host = 5;

    // The operation that is allowed or denied (e.g. READ).
    ACL.Operation operation = 6 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).required = true,
      (buf.validate.field).enum = {
        defined_only: true
        not_in: [0] /* Disallow: Unspecified */
      }
    ];

    // Whether the operation should be allowed or denied.
    ACL.PermissionType permission_type = 7 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).required = true,
      (buf.validate.field).enum = {
        defined_only: true
        not_in: [0] /* Disallow: Unspecified */
      }
    ];
  }

  Filter filter = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

message DeleteSchemaRegistryACLsResponse {
  message MatchingACL {
    ACL.ResourceType resource_type = 1;
    // The name of the resource this ACL targets.
    string resource_name = 2;
    ACL.ResourcePatternType resource_pattern_type = 3;
    // The user for whom this ACL applies.
    string principal = 4;
    // The host address to use for this ACL.
    string host = 5;
    ACL.Operation operation = 6;
    ACL.PermissionType permission_type = 7;
    google.rpc.Status error = 8;
  }

  repeated MatchingACL matching_acls = 1;
}


service SecurityService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {
    name: "Security"
    description: "Manage Redpanda roles."
  };

  // ListRoles lists all the roles based on optional filter.
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {get: "/v1/roles"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Roles"
      description: "List roles. Optional: filter based on role name and principal."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.ListRolesResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
    option (google.api.http) = {
      post: "/v1/roles"
      body: "role"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create Role"
      description: "Create a role."
      responses: {
        key: "201"
        value: {
          description: "Role created"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.CreateRoleResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  // GetRole retrieves the specific role.
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (google.api.http) = {get: "/v1/roles/{role_name}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get Role"
      description: "Get a role."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.GetRoleResponse"}
          }
        }
      }
      responses: {
        key: "404"
        value: {
          description: "Not Found"
          schema: {
            json_schema: {ref: ".google.rpc.Status"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  // DeleteRole deletes the role from the system.
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (google.api.http) = {delete: "/v1/roles/{role_name}"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete Role"
      description: "Delete a Role."
      responses: {
        key: "204"
        value: {
          description: "Role deleted successfully"
          schema: {}
        }
      }
      responses: {
        key: "404"
        value: {
          description: "Not Found"
          schema: {
            json_schema: {ref: ".google.rpc.Status"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  // ListRoleMembership lists all the members assigned to a role based on optional filter.
  rpc ListRoleMembers(ListRoleMembersRequest) returns (ListRoleMembersResponse) {
    option (google.api.http) = {get: "/v1/roles/{role_name}/members"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Role Members"
      description: "List members assigned to a role."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.ListRoleMembersResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  // UpdateRoleMembership updates role membership.
  // Partially update role membership, adding or removing from a role
  // ONLY those members listed in the “add” or “remove” fields, respectively.
  // Adding a member that is already assigned to the role (or removing one that is not) is a no-op,
  // and the rest of the members will be added and removed and reported.
  rpc UpdateRoleMembership(UpdateRoleMembershipRequest) returns (UpdateRoleMembershipResponse) {
    option (google.api.http) = {
      put: "/v1/roles/{role_name}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update Role"
      description: "Update a role."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.UpdateRoleMembershipResponse"}
          }
        }
      }
      responses: {
        key: "404"
        value: {
          description: "Not Found"
          schema: {
            json_schema: {ref: ".google.rpc.Status"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_REDPANDA_ADMIN
    };
  }

  // ListSchemaRegistryACLs lists Schema Registry ACLs that match the filter criteria.
  rpc ListSchemaRegistryACLs(ListSchemaRegistryACLsRequest) returns (ListSchemaRegistryACLsResponse) {
    option (google.api.http) = {get: "/v1/schema-registry/acls"};
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List Schema Registry ACLs"
      description: "List all Schema Registry ACLs. The `filter.` query string parameters find matching ACLs that meet all specified conditions."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.ListSchemaRegistryACLsResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_SCHEMA_REGISTRY
    };
  }

  // CreateSchemaRegistryACL creates a new Schema Registry ACL.
  rpc CreateSchemaRegistryACL(CreateSchemaRegistryACLRequest) returns (CreateSchemaRegistryACLResponse) {
    option (google.api.http) = {
      post: "/v1/schema-registry/acls"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create Schema Registry ACL"
      description: "Create a new Schema Registry ACL."
      responses: {
        key: "201"
        value: {
          description: "Created"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.CreateSchemaRegistryACLResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_SCHEMA_REGISTRY
    };
  }

  // DeleteSchemaRegistryACLs deletes Schema Registry ACLs that match the filter criteria.
  rpc DeleteSchemaRegistryACLs(DeleteSchemaRegistryACLsRequest) returns (DeleteSchemaRegistryACLsResponse) {
    option (google.api.http) = {
      post: "/v1/schema-registry/acls:remove"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete Schema Registry ACLs"
      description: "Delete all Schema Registry ACLs that match the filter criteria. The filter in the request body specifies which ACLs to delete."
      responses: {
        key: "200"
        value: {
          description: "OK"
          schema: {
            json_schema: {ref: ".redpanda.api.dataplane.v1.DeleteSchemaRegistryACLsResponse"}
          }
        }
      }
    };
    option (redpanda.api.auth.v1.authorization) = {
      required_permission: PERMISSION_ADMIN
      api: API_SCHEMA_REGISTRY
    };
  }

}
